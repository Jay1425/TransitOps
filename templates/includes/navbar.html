<header class="h-16 bg-white border-b border-slate-200 px-6 flex items-center justify-between sticky top-0 z-30 shadow-xs select-none">
    <div class="flex items-center gap-6">
        <!-- Page Title -->
        <h1 class="text-lg font-bold text-slate-800 tracking-tight hidden sm:block">
            {% block header_title %}System Console{% endblock %}
        </h1>

        <!-- Search Box -->
        <div class="relative w-64 md:w-80">
            <i data-lucide="search" class="w-4 h-4 text-slate-400 absolute left-3.5 top-1/2 -translate-y-1/2"></i>
            <input
                type="text"
                placeholder="Search ERP system (vehicles, drivers, trips)..."
                class="w-full bg-slate-100 hover:bg-slate-200/60 border border-transparent focus:border-[#2563EB] rounded-lg pl-10 pr-4 py-1.5 text-xs text-slate-800 placeholder-slate-400 focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#2563EB]/20 transition"
            >
        </div>
    </div>

    <div class="flex items-center gap-4">
        <!-- User Info & Role Badge -->
        <div class="flex items-center gap-3 border-l border-slate-200 pl-4">
            <div class="text-right hidden md:block">
                <div class="text-xs font-bold text-slate-800 leading-tight">
                    {{ request.user.get_full_name|default:request.user.username }}
                </div>
                <!-- Role Badge -->
                <div class="mt-0.5">
                    <span class="inline-block px-2 py-0.5 rounded text-[9px] font-extrabold uppercase tracking-wider bg-blue-50 text-[#2563EB] border border-blue-200">
                        {% if request.user.is_superuser %}Super Admin{% else %}{{ request.user.get_role_display|default:request.user.role }}{% endif %}
                    </span>
                </div>
            </div>

            <!-- Profile Circle -->
            <div class="w-9 h-9 rounded-full bg-[#2563EB] text-white flex items-center justify-center font-bold text-xs tracking-wider shadow-xs shrink-0 uppercase border-2 border-blue-100">
                {{ request.user.username|slice:":2" }}
            </div>

            <!-- Logout Button -->
            <a href="{% url 'logout' %}" class="bg-slate-100 hover:bg-red-50 text-slate-600 hover:text-red-600 border border-slate-200 hover:border-red-200 px-3 py-1.5 rounded-lg text-xs font-semibold flex items-center gap-1.5 transition ml-1" title="Log Out">
                <i data-lucide="log-out" class="w-3.5 h-3.5 shrink-0"></i>
                <span class="hidden lg:inline">Logout</span>
            </a>
        </div>
    </div>
</header>
