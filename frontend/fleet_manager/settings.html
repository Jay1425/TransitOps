<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — TransitOps ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="bg-[#F8FAFC] text-[#0F172A]">

  <!-- SIDEBAR -->
  <aside id="sidebar" class="sidebar text-slate-350 flex flex-col justify-between">
    <div>
      <div class="sidebar-logo flex items-center gap-3 px-6 py-4.5 border-b border-slate-800">
        <i data-lucide="truck" class="w-5 h-5 text-[#2563EB]"></i>
        <span class="logo-text font-bold text-white tracking-tight">TransitOps ERP</span>
      </div>
      <div class="px-3.5 py-4">
        <div class="flex items-center gap-3 bg-slate-800/40 border border-slate-700/50 rounded p-2 mb-4">
          <div class="w-8 h-8 rounded bg-blue-600 flex items-center justify-center font-bold text-white text-xs">AM</div>
          <div class="user-info logo-text">
            <div id="session-user-name" class="text-xs font-bold text-white">Alex Morgan</div>
            <div id="session-user-role" class="text-[10px] text-slate-400 font-medium">Fleet Manager</div>
          </div>
        </div>
        
        <nav class="space-y-4">
          <div>
            <div class="sidebar-header-label text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 px-2.5">Main</div>
            <div class="space-y-0.5">
              <a href="dashboard.html" class="nav-item">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i><span class="nav-text">Dashboard</span>
              </a>
              <a href="vehicles.html" class="nav-item">
                <i data-lucide="truck" class="w-4 h-4"></i><span class="nav-text">Vehicles</span>
              </a>
              <a href="trips.html" class="nav-item">
                <i data-lucide="route" class="w-4 h-4"></i><span class="nav-text">Trips</span><span class="nav-badge ml-auto bg-blue-600/30 text-blue-400 px-2 py-0.5 text-[9px] font-bold rounded-full">3</span>
              </a>
            </div>
          </div>

          <div>
            <div class="sidebar-header-label text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 px-2.5">Operations</div>
            <div class="space-y-0.5">
              <a href="drivers.html" class="nav-item">
                <i data-lucide="users" class="w-4 h-4"></i><span class="nav-text">Drivers</span>
              </a>
              <a href="maintenance.html" class="nav-item">
                <i data-lucide="wrench" class="w-4 h-4"></i><span class="nav-text">Maintenance</span><span class="nav-badge ml-auto bg-red-650/30 text-red-400 px-2 py-0.5 text-[9px] font-bold rounded-full">2</span>
              </a>
              <a href="fuel.html" class="nav-item">
                <i data-lucide="fuel" class="w-4 h-4"></i><span class="nav-text">Fuel Logs</span>
              </a>
            </div>
          </div>

          <div>
            <div class="sidebar-header-label text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 px-2.5">Analytics</div>
            <div class="space-y-0.5">
              <a href="reports.html" class="nav-item">
                <i data-lucide="bar-chart-3" class="w-4 h-4"></i><span class="nav-text">Reports</span>
              </a>
              <a href="../finance/dashboard.html" class="nav-item">
                <i data-lucide="wallet" class="w-4 h-4"></i><span class="nav-text">Finance</span>
              </a>
            </div>
          </div>

          <div>
            <div class="sidebar-header-label text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 px-2.5">System</div>
            <div class="space-y-0.5">
              <a href="settings.html" class="nav-item active">
                <i data-lucide="settings" class="w-4 h-4"></i><span class="nav-text">Settings</span>
              </a>
            </div>
          </div>
        </nav>
      </div>
    </div>
    <div class="px-3.5 py-4 border-t border-slate-800">
      <button onclick="terminateMockSession()" class="w-full flex items-center gap-2.5 px-3 py-2 rounded bg-red-500/10 border border-red-500/20 text-red-400 font-semibold text-xs uppercase tracking-wider hover:bg-red-500/20 transition">
        <i data-lucide="log-out" class="w-4 h-4"></i><span class="nav-text">Sign Out</span>
      </button>
    </div>
  </aside>

  <!-- MAIN CONTAINER -->
  <div id="main-content" class="lg:pl-64 min-h-screen flex flex-col transition-all duration-200">
    <!-- TOPBAR -->
    <header class="navbar flex items-center justify-between px-6 shadow-sm">
      <div class="flex items-center gap-4">
        <button id="sidebar-toggle" class="text-slate-600 hover:text-[#2563EB] focus:outline-none">
          <i data-lucide="menu" class="w-5 h-5"></i>
        </button>
        <div class="hidden sm:flex items-center gap-2 text-[10px] font-bold text-slate-400 uppercase tracking-wider">
          <span>Fleet Manager</span>
          <span class="text-slate-300">/</span>
          <span class="text-[#2563EB]">Settings</span>
        </div>
      </div>
      
      <div class="flex items-center gap-4">
        <div class="relative">
          <button id="profile-menu-button" class="flex items-center gap-2 text-xs font-bold text-slate-700 hover:text-[#2563EB] focus:outline-none">
            <div class="w-7 h-7 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold">AM</div>
            <span class="hidden md:inline">Alex Morgan</span>
            <i data-lucide="chevron-down" class="w-3.5 h-3.5"></i>
          </button>
          <div id="profile-dropdown" class="profile-dropdown-menu mt-2 py-1 bg-white border border-slate-200 rounded shadow-lg">
            <a href="#" onclick="triggerToast('Profile...','info')" class="block px-4 py-2 text-xs text-slate-700 hover:bg-slate-50">My Profile</a>
            <hr class="border-slate-100 my-1">
            <button onclick="terminateMockSession()" class="w-full text-left block px-4 py-2 text-xs text-red-500 hover:bg-red-50">Sign Out</button>
          </div>
        </div>
      </div>
    </header>

    <!-- CONTENT BODY -->
    <main class="flex-1 p-6 space-y-6 max-w-3xl w-full mx-auto">
      <div>
        <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">System Settings</h1>
        <p class="text-xs text-slate-500">Configure distance thresholds and alert logs configurations.</p>
      </div>

      <div class="erp-card p-6 space-y-6">
        <div class="grid sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-[9px] font-bold text-slate-555 uppercase tracking-wider mb-1.5">Distance Unit</label>
            <select class="input-field text-xs py-2">
              <option>Kilometers (km)</option>
              <option>Miles (mi)</option>
            </select>
          </div>
          <div>
            <label class="block text-[9px] font-bold text-slate-555 uppercase tracking-wider mb-1.5">Fuel Unit</label>
            <select class="input-field text-xs py-2">
              <option>Litres (L)</option>
              <option>Gallons (gal)</option>
            </select>
          </div>
        </div>
        <div class="flex justify-end pt-2">
          <button onclick="triggerToast('Settings updated!','success')" class="btn-primary-erp text-xs py-2 uppercase tracking-wider font-bold">
            Save Settings
          </button>
        </div>
      </div>
    </main>
  </div>

  <script src="../assets/js/script.js"></script>
  <script>
    verifyAccessGuard('fleet_manager');
  </script>
</body>
</html>
