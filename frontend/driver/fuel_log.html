<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log Fuel — TransitOps ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="bg-[#F8FAFC] text-[#0F172A]">

  <!-- SIDEBAR -->
  <aside id="sidebar" class="sidebar text-slate-350 flex flex-col justify-between">
    <div>
      <div class="sidebar-logo flex items-center gap-3 px-6 py-4.5 border-b border-slate-800">
        <i data-lucide="truck" class="w-5 h-5 text-[#2563EB]"></i>
        <span class="logo-text font-bold text-white tracking-tight">TransitOps ERP</span>
      </div>
      <div class="px-3.5 py-4">
        <div class="flex items-center gap-3 bg-slate-800/40 border border-slate-700/50 rounded p-2 mb-4">
          <div class="w-8 h-8 rounded bg-green-600 flex items-center justify-center font-bold text-white text-xs">MD</div>
          <div class="user-info logo-text">
            <div id="session-user-name" class="text-xs font-bold text-white">Marcus Davis</div>
            <div id="session-user-role" class="text-[10px] text-slate-400 font-medium">Driver</div>
          </div>
        </div>
        
        <nav class="space-y-4">
          <div>
            <div class="sidebar-header-label text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 px-2.5">Main Menu</div>
            <div class="space-y-0.5">
              <a href="dashboard.html" class="nav-item">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i><span class="nav-text">Dashboard</span>
              </a>
              <a href="my_trips.html" class="nav-item">
                <i data-lucide="route" class="w-4 h-4"></i><span class="nav-text">My Trips</span><span class="nav-badge ml-auto bg-blue-600/30 text-blue-400 px-2 py-0.5 text-[9px] font-bold rounded-full">2</span>
              </a>
              <a href="fuel_log.html" class="nav-item active">
                <i data-lucide="fuel" class="w-4 h-4"></i><span class="nav-text">Fuel Logs</span>
              </a>
              <a href="profile.html" class="nav-item">
                <i data-lucide="user-circle" class="w-4 h-4"></i><span class="nav-text">Profile</span>
              </a>
            </div>
          </div>
        </nav>
      </div>
    </div>
    <div class="px-3.5 py-4 border-t border-slate-800">
      <button onclick="terminateMockSession()" class="w-full flex items-center gap-2.5 px-3 py-2 rounded bg-red-500/10 border border-red-500/20 text-red-400 font-semibold text-xs uppercase tracking-wider hover:bg-red-500/20 transition">
        <i data-lucide="log-out" class="w-4 h-4"></i><span class="nav-text">Sign Out</span>
      </button>
    </div>
  </aside>

  <!-- MAIN CONTAINER -->
  <div id="main-content" class="lg:pl-64 min-h-screen flex flex-col transition-all duration-200">
    <!-- TOPBAR -->
    <header class="navbar flex items-center justify-between px-6 shadow-sm">
      <div class="flex items-center gap-4">
        <button id="sidebar-toggle" class="text-slate-600 hover:text-[#2563EB] focus:outline-none">
          <i data-lucide="menu" class="w-5 h-5"></i>
        </button>
        <div class="hidden sm:flex items-center gap-2 text-[10px] font-bold text-slate-400 uppercase tracking-wider">
          <span>Driver Console</span>
          <span class="text-slate-300">/</span>
          <span class="text-[#2563EB]">Fuel Logs</span>
        </div>
      </div>
      
      <div class="flex items-center gap-4">
        <div class="relative">
          <button id="profile-menu-button" class="flex items-center gap-2 text-xs font-bold text-slate-700 hover:text-[#2563EB] focus:outline-none">
            <div class="w-7 h-7 rounded-full bg-green-100 text-green-600 flex items-center justify-center font-bold">MD</div>
            <span class="hidden md:inline">Marcus Davis</span>
            <i data-lucide="chevron-down" class="w-3.5 h-3.5"></i>
          </button>
          <div id="profile-dropdown" class="profile-dropdown-menu mt-2 py-1 bg-white border border-slate-200 rounded shadow-lg">
            <a href="profile.html" class="block px-4 py-2 text-xs text-slate-700 hover:bg-slate-50">My Profile</a>
            <hr class="border-slate-100 my-1">
            <button onclick="terminateMockSession()" class="w-full text-left block px-4 py-2 text-xs text-red-500 hover:bg-red-50">Sign Out</button>
          </div>
        </div>
      </div>
    </header>

    <!-- CONTENT BODY -->
    <main class="flex-1 p-6 space-y-6 max-w-3xl w-full mx-auto">
      <div>
        <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Upload Fuel Receipt</h1>
        <p class="text-xs text-slate-500">Record vehicle gas additions and submit odometer status logs.</p>
      </div>

      <div class="erp-card p-6 space-y-4">
        <div class="grid sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-[9px] font-bold text-slate-555 uppercase tracking-wider mb-1.5">Litres Filled</label>
            <input type="number" class="input-field text-xs py-2" placeholder="e.g. 85.0">
          </div>
          <div>
            <label class="block text-[9px] font-bold text-slate-555 uppercase tracking-wider mb-1.5">Total Cost ($)</label>
            <input type="number" class="input-field text-xs py-2" placeholder="e.g. 136.00">
          </div>
          <div>
            <label class="block text-[9px] font-bold text-slate-555 uppercase tracking-wider mb-1.5">Odometer at Refuel</label>
            <input type="number" class="input-field text-xs py-2" placeholder="e.g. 84231">
          </div>
          <div>
            <label class="block text-[9px] font-bold text-slate-555 uppercase tracking-wider mb-1.5">Fuel Station</label>
            <input type="text" class="input-field text-xs py-2" placeholder="e.g. Shell Stop #7">
          </div>
        </div>
        <div>
          <label class="block text-[9px] font-bold text-slate-555 uppercase tracking-wider mb-1.5">Receipt File</label>
          <input type="file" class="block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
        </div>
        <div class="flex justify-end pt-2">
          <button onclick="triggerToast('Fuel receipt uploaded successfully!','success')" class="btn-primary-erp text-xs py-2 uppercase tracking-wider font-bold">
            Submit Fuel Log
          </button>
        </div>
      </div>
    </main>
  </div>

  <script src="../assets/js/script.js"></script>
  <script>
    verifyAccessGuard('driver');
  </script>
</body>
</html>
